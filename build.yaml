include:
  # DONGLE (Central com Display)
  - board: nice_nano_v2
    shield: corne_central_dongle dongle_display
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=n -DCONFIG_ZMK_STUDIO_LOCKING=n
    artifact-name: corne_dongle_oled

  # LADO ESQUERDO
  - board: nice_nano_v2
    shield: corne_left
    artifact-name: corne_left

  # LADO DIREITO
  - board: nice_nano_v2
    shield: corne_right
    artifact-name: corne_right

  # RESET (Essencial para limpar a bagunça do eyeslash)
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings_reset
